settings:
  application:
    # dev开发环境 test测试环境 prod线上环境
    mode: dev
    # 服务器ip，默认使用 0.0.0.0
    host: 0.0.0.0
    # 服务名称
    name: testApp
    # 端口号
    port: 18123 # 服务端口号
    readtimeout: 1
    writertimeout: 300
    # 数据权限功能开关
    enabledp: false
  ssl:
    # https对应的域名
    domain: localhost:18123
    # https开关
    enable: false
    # ssl 证书key
    key: keystring
    # ssl 证书路径
    pem: temp/pem.pem
  logger:
    # 日志存放路径
    path: temp/logs
    # 日志输出，file：文件，default：命令行，其他：命令行
    stdout: '' #控制台日志，启用后，不输出到文件
    # 日志等级, trace, debug, info, warn, error, fatal
    level: trace
    # 数据库日志开关
    enableddb: false
  jwt:
    # token 密钥，生产环境时及的修改
    secret: go-admin
    # token 过期时间 单位：秒
    timeout: 3600
  database:
    # 数据库类型 mysql，sqlite3， postgres
    driver: mysql
    # 数据库连接字符串 mysql 缺省信息 charset=utf8&parseTime=True&loc=Local&timeout=1000ms
    source: user:password@tcp(127.0.0.1:3306)/dbname?charset=utf8&parseTime=True&loc=Local&timeout=1000ms
    # source: sqlite3.db
    # source: host=myhost port=myport user=gorm dbname=gorm password=mypassword
    registers:
      - sources:
          - user:password@tcp(127.0.0.1:3306)/dbname?charset=utf8&parseTime=True&loc=Local&timeout=1000ms
  gen:
    # 代码生成读取的数据库名称
    dbname: dbname
    # 代码生成是使用前端代码存放位置，需要指定到src文件夹，相对路径
    frontpath: ../go-admin-ui/src
  queue:
    memory:
      poolSize: 100
  extend: # 扩展项使用说明
    demo:
      name: data
    ops:
      taskTimeoutSeconds: 900
      environments:
        - key: dev
          name: 开发环境
          enabled: true
          domain: https://dev.example.com
          confirmName: false
          taskTimeoutSeconds: 900
          backend:
            repoDir: /data/projects/backend-dev
            composeFile: /data/projects/backend-dev/docker-compose.yml
            serviceName: backend
            healthURL: http://127.0.0.1:8001/api/v1/health
          frontend:
            repoDir: /data/projects/frontend-dev
            distDir: dist
            publishDir: /data/www/dev
            reloadNginx: true
        - key: test
          name: 测试环境
          enabled: true
          domain: https://test.example.com
          confirmName: false
          taskTimeoutSeconds: 900
          backend:
            repoDir: /data/projects/backend-test
            composeFile: /data/projects/backend-test/docker-compose.yml
            serviceName: backend
            healthURL: http://127.0.0.1:8002/api/v1/health
          frontend:
            repoDir: /data/projects/frontend-test
            distDir: dist
            publishDir: /data/www/test
            reloadNginx: true
        - key: prod
          name: 生产环境
          enabled: true
          domain: https://www.example.com
          confirmName: true
          taskTimeoutSeconds: 1200
          backend:
            repoDir: /data/projects/backend-prod
            composeFile: /data/projects/backend-prod/docker-compose.yml
            serviceName: backend
            healthURL: http://127.0.0.1:18123/api/v1/health
          frontend:
            repoDir: /data/projects/frontend-prod
            distDir: dist
            publishDir: /data/www/prod
            reloadNginx: true
