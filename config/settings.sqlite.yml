settings:
  application:
    # dev开发环境 test测试环境 prod线上环境
    mode: dev
    # 服务器ip，默认使用 0.0.0.0
    host: 0.0.0.0
    # 服务名称
    name: testApp
    # 端口号
    port: 18123 # 服务端口号
    readtimeout: 3000
    writertimeout: 2000
    # 数据权限功能开关
    enabledp: false
  logger:
    # 日志存放路径
    path: temp/logs
    # 日志输出，file：文件，default：命令行，其他：命令行
    stdout: '' #控制台日志，启用后，不输出到文件
    # 日志等级, trace, debug, info, warn, error, fatal
    level: trace
    # 数据库日志开关
    enableddb: false
  jwt:
    # token 密钥，生产环境时及的修改
    secret: go-admin
    # token 过期时间 单位：秒
    timeout: 3600
  database:
    # 数据库类型 mysql，sqlite3， postgres
    driver: sqlite3
    # 数据库连接sqlite3数据文件的路径
    source: go-admin-db.db
  extend:
    runtime:
      # 本地开发可开启，服务启动/air 重启时会自动执行幂等迁移检查；生产建议关闭并显式执行 go-admin migrate
      autoMigrateOnStart: false
