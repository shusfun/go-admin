services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    network_mode: bridge
    environment:
      POSTGRES_DB: ${DEV_POSTGRES_DB:-go_admin_dev}
      POSTGRES_USER: ${DEV_POSTGRES_USER:-go_admin_dev}
      POSTGRES_PASSWORD: ${DEV_POSTGRES_PASSWORD:-go_admin_dev}
      TZ: Asia/Shanghai
    ports:
      - ${DEV_POSTGRES_PORT:-15432}:5432
    volumes:
      - ./.tmp/docker/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DEV_POSTGRES_USER:-go_admin_dev} -d ${DEV_POSTGRES_DB:-go_admin_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    network_mode: bridge
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - ${DEV_REDIS_PORT:-16379}:6379
    volumes:
      - ./.tmp/docker/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
